<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – 10men.cz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #EE220C;
      --red-dark:   #c41a09;
      --black:      #111;
      --gray-dark:  #222;
      --gray-mid:   #888;
      --gray-light: #e8e8e8;
      --bg:         #f5f5f5;
      --white:      #fff;
      --radius:     4px;
      --transition: 0.18s ease;
    }

    body {
      font-family: 'Work Sans', sans-serif;
      background: var(--bg);
      color: var(--black);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #screen-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--black);
    }
    .login-card {
      background: var(--white);
      border-radius: 6px;
      padding: 48px 40px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .login-card .logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .login-card .logo span { color: var(--red); }
    .login-card p {
      font-size: 13px;
      color: var(--gray-mid);
      margin-bottom: 32px;
    }
    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      padding: 12px 24px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
      width: 100%;
      justify-content: center;
    }
    .btn-google:hover { background: var(--red-dark); }

    /* ── APP ── */
    #screen-app { display: none; min-height: 100vh; }

    .admin-header {
      background: var(--black);
      color: var(--white);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header .logo {
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: -0.01em;
    }
    .admin-header .logo span { color: var(--red); }
    .admin-header .spacer { flex: 1; }
    .admin-header .user-email {
      font-size: 12px;
      color: #888;
    }
    .btn-sm {
      background: none;
      border: 1px solid #444;
      color: #ccc;
      border-radius: var(--radius);
      padding: 6px 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-sm:hover { border-color: #999; color: var(--white); }

    .admin-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--gray-light);
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-mid);
      cursor: pointer;
      transition: var(--transition);
    }
    .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }
    .tab-btn:hover:not(.active) { color: var(--black); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar h2 { font-size: 1rem; font-weight: 700; }
    .toolbar-right { display: flex; gap: 10px; align-items: center; }

    .btn { 
      display: inline-flex; align-items: center; gap: 6px;
      border: none; border-radius: var(--radius);
      padding: 10px 18px; font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: var(--transition);
    }
    .btn-primary { background: var(--red); color: var(--white); }
    .btn-primary:hover { background: var(--red-dark); }
    .btn-secondary { background: var(--white); color: var(--black); border: 1.5px solid var(--gray-light); }
    .btn-secondary:hover { border-color: var(--gray-mid); }
    .btn-generate {
      background: var(--black); color: var(--white);
      font-size: 13px;
    }
    .btn-generate:hover { background: #333; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── CONCERT LIST ── */
    #concert-list { display: flex; flex-direction: column; gap: 10px; }
    .concert-row {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-light);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .concert-row .date-badge {
      background: var(--red);
      color: var(--white);
      border-radius: 3px;
      padding: 8px 10px;
      text-align: center;
      min-width: 52px;
      flex-shrink: 0;
    }
    .concert-row .date-badge .day { font-weight: 900; font-size: 1.3rem; line-height: 1; }
    .concert-row .date-badge .mo  { font-size: 10px; font-weight: 600; text-transform: uppercase; margin-top: 3px; }
    .concert-row .info { flex: 1; min-width: 0; }
    .concert-row .info .title { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .concert-row .info .meta  { font-size: 12px; color: var(--gray-mid); margin-top: 3px; }
    .concert-row .actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-icon {
      background: none; border: 1px solid var(--gray-light);
      border-radius: var(--radius); padding: 6px 10px;
      font-size: 13px; cursor: pointer; transition: var(--transition);
      color: var(--black);
    }
    .btn-icon:hover { border-color: var(--gray-mid); }
    .btn-icon.danger:hover { border-color: var(--red); color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--gray-mid);
      font-size: 14px;
    }

    /* ── FORM OVERLAY ── */
    #form-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.5);
      overflow-y: auto;
      padding: 32px 16px;
    }
    #form-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    .form-card {
      background: var(--white);
      border-radius: 6px;
      width: 100%; max-width: 680px;
      padding: 32px;
      position: relative;
    }
    .form-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; }
    .form-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--gray-mid); line-height: 1;
    }
    .form-close:hover { color: var(--black); }

    .form-row { margin-bottom: 18px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--gray-mid); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    input[type="text"], input[type="date"], input[type="time"], input[type="url"], textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--gray-light);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      color: var(--black);
      background: var(--white);
      transition: border-color var(--transition);
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--red);
    }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    .translate-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .btn-translate {
      background: none; border: 1.5px solid var(--gray-light);
      border-radius: var(--radius); padding: 4px 12px;
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: var(--transition); color: var(--black);
      display: flex; align-items: center; gap: 5px;
    }
    .btn-translate:hover { border-color: var(--red); color: var(--red); }
    .btn-translate:disabled { opacity: 0.5; cursor: not-allowed; }

    .lang-tabs { display: flex; gap: 4px; margin-bottom: 6px; }
    .lang-tab {
      padding: 4px 10px; border-radius: var(--radius);
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--gray-light); background: none;
      transition: var(--transition); color: var(--gray-mid);
    }
    .lang-tab.active { background: var(--red); border-color: var(--red); color: var(--white); }
    .lang-tab:hover:not(.active) { border-color: var(--gray-mid); color: var(--black); }

    .lang-panel { display: none; }
    .lang-panel.active { display: block; }

    .checkbox-row { display: flex; align-items: center; gap: 10px; }
    .checkbox-row input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--red); cursor: pointer;
    }
    .checkbox-row label {
      margin: 0; text-transform: none; font-size: 14px;
      font-weight: 400; color: var(--black); letter-spacing: 0;
    }

    .form-divider { border: none; border-top: 1px solid var(--gray-light); margin: 20px 0; }

    .form-actions {
      display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px;
    }

    .section-toggle {
      background: none; border: none; font-family: inherit;
      font-size: 12px; font-weight: 600; color: var(--gray-mid);
      cursor: pointer; display: flex; align-items: center; gap: 4px;
      padding: 4px 0; margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .section-toggle:hover { color: var(--black); }
    .advanced-section { display: none; }
    .advanced-section.open { display: block; }

    /* ── STATUS BAR ── */
    #status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--black); color: var(--white);
      padding: 12px 24px; font-size: 13px;
      display: none; align-items: center; gap: 12px; z-index: 300;
    }
    #status-bar.show { display: flex; }
    #status-bar .status-icon { font-size: 16px; }
    #status-bar.error { background: #8b0000; }
    #status-bar.success { background: #1a5c2e; }

    @media (max-width: 560px) {
      .form-card { padding: 24px 16px; }
      .form-row-2 { grid-template-columns: 1fr; }
      .concert-row .date-badge { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══ LOGIN ═══════════════════════════════════════════════════════════════ -->
<div id="screen-login">
  <div class="login-card">
    <div class="logo">10<span>men</span></div>
    <p>Správa webu – přihlaste se firemním účtem</p>
    <button class="btn-google" id="btn-login">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.4-.1-2.7-.5-4z"/></svg>
      Přihlásit přes Google
    </button>
  </div>
</div>

<!-- ═══ APP ══════════════════════════════════════════════════════════════════ -->
<div id="screen-app">
  <header class="admin-header">
    <div class="logo">10<span>men</span> <span style="color:#555;font-weight:400;font-size:.85rem">admin</span></div>
    <div class="spacer"></div>
    <span class="user-email" id="user-email"></span>
    <button class="btn-sm" id="btn-logout">Odhlásit</button>
  </header>

  <div class="admin-main">
    <div class="tabs">
      <button class="tab-btn active" data-tab="upcoming">🎵 Nadcházející akce</button>
      <button class="tab-btn" data-tab="past">📁 Proběhlé akce</button>
    </div>

    <div class="toolbar">
      <h2 id="tab-title">Plánované koncerty</h2>
      <div class="toolbar-right">
        <button class="btn btn-generate" id="btn-generate">🚀 Generovat web</button>
        <button class="btn btn-primary" id="btn-add">+ Přidat akci</button>
      </div>
    </div>

    <div id="concert-list">
      <div class="empty-state">Načítám…</div>
    </div>
  </div>
</div>

<!-- ═══ FORM OVERLAY ══════════════════════════════════════════════════════════ -->
<div id="form-overlay">
  <div class="form-card">
    <button class="form-close" id="form-close">✕</button>
    <h3 id="form-title">Nová akce</h3>

    <!-- Název + Datum -->
    <div class="form-row">
      <label>Název akce (česky)</label>
      <input type="text" id="f-title" placeholder="Např. Letní interference: 10men & Verum">
    </div>

    <div class="form-row-2">
      <div>
        <label>Datum</label>
        <input type="date" id="f-date">
      </div>
      <div id="f-time-row">
        <label>Čas (nepovinné)</label>
        <input type="time" id="f-time">
      </div>
    </div>

    <!-- UPCOMING pole -->
    <div id="upcoming-fields">
      <div class="form-row">
        <label>Místo / adresa</label>
        <input type="text" id="f-venue" placeholder="Např. Husův sbor CČSH, Dykova 51/1, Praha 10">
      </div>

      <div class="form-row">
        <div class="translate-header">
          <label style="margin:0">Popis akce</label>
          <button class="btn-translate" id="btn-translate">
            🌐 Přeložit EN / DE / ES
          </button>
        </div>
        <div class="lang-tabs" style="margin-top:6px">
          <button class="lang-tab active" data-lang="cs">CS</button>
          <button class="lang-tab" data-lang="en">EN</button>
          <button class="lang-tab" data-lang="de">DE</button>
          <button class="lang-tab" data-lang="es">ES</button>
        </div>
        <div class="lang-panel active" data-lang="cs">
          <textarea id="f-desc-cs" placeholder="Napište český popis akce…"></textarea>
        </div>
        <div class="lang-panel" data-lang="en">
          <textarea id="f-desc-en" placeholder="English description (auto-translated, can be edited)…"></textarea>
        </div>
        <div class="lang-panel" data-lang="de">
          <textarea id="f-desc-de" placeholder="Deutsche Beschreibung (automatisch übersetzt)…"></textarea>
        </div>
        <div class="lang-panel" data-lang="es">
          <textarea id="f-desc-es" placeholder="Descripción en español (traducida automáticamente)…"></textarea>
        </div>
      </div>

      <hr class="form-divider">
      <div class="form-row-2">
        <div>
          <label>Google Maps odkaz</label>
          <input type="url" id="f-maps" placeholder="https://maps.app.goo.gl/…">
        </div>
        <div>
          <label>FB událost (nepovinné)</label>
          <input type="url" id="f-fb" placeholder="https://facebook.com/events/…">
        </div>
      </div>
      <div class="form-row">
        <label>Vstupenky (nepovinné)</label>
        <input type="url" id="f-tickets" placeholder="https://…">
      </div>
    </div>

    <!-- PAST pole -->
    <div id="past-fields" style="display:none">
      <div class="form-row">
        <label>URL fotografií (Google Photos, nepovinné)</label>
        <input type="url" id="f-photos" placeholder="https://photos.app.goo.gl/…">
      </div>
      <div class="form-row">
        <div class="checkbox-row">
          <input type="checkbox" id="f-highlight">
          <label for="f-highlight">Zvýraznit tučně (soutěžní výsledek, výroční akce)</label>
        </div>
      </div>

      <!-- Pokročilé: override data pro rozsahy -->
      <button class="section-toggle" id="toggle-advanced">▸ Pokročilé: vlastní zobrazení data</button>
      <div class="advanced-section" id="advanced-section">
        <p style="font-size:12px;color:var(--gray-mid);margin-bottom:12px">
          Vyplň jen pokud je datum rozsah (např. "4.–6. října 2024"). Jinak se datum generuje automaticky.
        </p>
        <div class="form-row-2">
          <div><label>Datum CS</label><input type="text" id="f-dd-cs" placeholder="4.–6. října 2024"></div>
          <div><label>Datum EN</label><input type="text" id="f-dd-en" placeholder="October 4–6, 2024"></div>
        </div>
        <div class="form-row-2">
          <div><label>Datum DE</label><input type="text" id="f-dd-de" placeholder="4.–6. Oktober 2024"></div>
          <div><label>Datum ES</label><input type="text" id="f-dd-es" placeholder="4–6 de octubre de 2024"></div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-secondary" id="btn-cancel">Zrušit</button>
      <button class="btn btn-primary" id="btn-save">Uložit</button>
    </div>
  </div>
</div>

<!-- ═══ STATUS BAR ═══════════════════════════════════════════════════════════ -->
<div id="status-bar">
  <span class="status-icon" id="status-icon">⏳</span>
  <span id="status-text">Ukládám…</span>
</div>

<!-- ═══ SCRIPT ════════════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider,
         signInWithPopup, signOut,
         onAuthStateChanged }                     from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs,
         addDoc, updateDoc, deleteDoc, doc,
         Timestamp, query, orderBy }              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Config ───────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAI7PK-1bpC2-DTd7QLJ-CMrrqB3Veefz0",
  authDomain:        "men-web-88372.firebaseapp.com",
  projectId:         "men-web-88372",
  storageBucket:     "men-web-88372.firebasestorage.app",
  messagingSenderId: "516421300705",
  appId:             "1:516421300705:web:426872d6003bc0ec74e2a0",
};
const GITHUB_REPO     = 'sidnexon-bot/10men-web';
const GITHUB_WORKFLOW = 'generate-concerts.yml';

// ── ALLOWLIST — přidej e-maily členů, kteří mají mít přístup ─────────────────
const ALLOWLIST = [
  sidney4hassane@gmail.com
  info.band10men@gmail.com
];
// Pokud je ALLOWLIST prázdný, přístup mají všichni přihlášení uživatelé.
// Vyplň e-mailové adresy a odkomentuj, jakmile budeš chtít omezit přístup.

// ── Init ─────────────────────────────────────────────────────────────────────
const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ─────────────────────────────────────────────────────────────────────
let currentTab  = 'upcoming';
let concerts    = [];
let editingId   = null; // null = nový záznam

// ── Auth ──────────────────────────────────────────────────────────────────────
document.getElementById('btn-login').addEventListener('click', () => {
  signInWithPopup(auth, new GoogleAuthProvider()).catch(e => showStatus(e.message, 'error'));
});
document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, user => {
  if (!user) {
    show('screen-login'); hide('screen-app'); return;
  }
  if (ALLOWLIST.length > 0 && !ALLOWLIST.includes(user.email)) {
    signOut(auth);
    alert(`Přístup odepřen: ${user.email}`);
    return;
  }
  document.getElementById('user-email').textContent = user.email;
  show('screen-app'); hide('screen-login');
  loadConcerts();
});

// ── Firestore: načtení ────────────────────────────────────────────────────────
async function loadConcerts() {
  try {
    const snap = await getDocs(query(collection(db, 'concerts'), orderBy('date', 'desc')));
    concerts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderList();
  } catch (e) {
    showStatus('Chyba při načítání: ' + e.message, 'error');
  }
}

// ── Render listingu ───────────────────────────────────────────────────────────
const MONTH_SHORT_CS = ['Led','Úno','Bře','Dub','Kvě','Čvn','Čvc','Srp','Zář','Říj','Lis','Pro'];

function renderList() {
  const list = document.getElementById('concert-list');
  const filtered = concerts.filter(c => c.type === currentTab);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">Žádné záznamy. Přidej první akci.</div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const d   = c.date.toDate();
    const day = d.getDate();
    const mo  = MONTH_SHORT_CS[d.getMonth()];
    const meta = currentTab === 'upcoming'
      ? c.venue || ''
      : (c.photosUrl ? '📷 Fotky' : '');
    return `
      <div class="concert-row">
        <div class="date-badge"><div class="day">${day}</div><div class="mo">${mo}</div></div>
        <div class="info">
          <div class="title">${c.highlight ? '★ ' : ''}${c.title}</div>
          ${meta ? `<div class="meta">${meta}</div>` : ''}
        </div>
        <div class="actions">
          <button class="btn-icon" data-edit="${c.id}">✏️ Upravit</button>
          <button class="btn-icon danger" data-delete="${c.id}">🗑</button>
        </div>
      </div>`;
  }).join('');

  // Edit / Delete listenery
  list.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => openForm(btn.dataset.edit));
  });
  list.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', () => deleteConcert(btn.dataset.delete));
  });
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.getElementById('tab-title').textContent =
      currentTab === 'upcoming' ? 'Plánované koncerty' : 'Archiv proběhlých akcí';
    renderList();
  });
});

// ── Form: otevření ────────────────────────────────────────────────────────────
function openForm(id = null) {
  editingId = id;
  document.getElementById('form-title').textContent = id ? 'Upravit akci' : 'Nová akce';
  resetForm();

  if (id) {
    const c = concerts.find(x => x.id === id);
    if (!c) return;
    document.getElementById('f-title').value = c.title || '';
    document.getElementById('f-date').value  = toDateInput(c.date.toDate());
    document.getElementById('f-time').value  = c.time || '';

    if (c.type === 'upcoming') {
      document.getElementById('f-venue').value    = c.venue    || '';
      document.getElementById('f-desc-cs').value  = c.desc_cs  || '';
      document.getElementById('f-desc-en').value  = c.desc_en  || '';
      document.getElementById('f-desc-de').value  = c.desc_de  || '';
      document.getElementById('f-desc-es').value  = c.desc_es  || '';
      document.getElementById('f-maps').value     = c.mapsUrl  || '';
      document.getElementById('f-fb').value       = c.fbUrl    || '';
      document.getElementById('f-tickets').value  = c.ticketsUrl || '';
    } else {
      document.getElementById('f-photos').value    = c.photosUrl || '';
      document.getElementById('f-highlight').checked = c.highlight || false;
      if (c.dateDisplay) {
        document.getElementById('f-dd-cs').value = c.dateDisplay.cs || '';
        document.getElementById('f-dd-en').value = c.dateDisplay.en || '';
        document.getElementById('f-dd-de').value = c.dateDisplay.de || '';
        document.getElementById('f-dd-es').value = c.dateDisplay.es || '';
      }
    }
  }

  // Zobraz správné pole podle tabu
  const isUpcoming = currentTab === 'upcoming';
  document.getElementById('upcoming-fields').style.display = isUpcoming ? '' : 'none';
  document.getElementById('past-fields').style.display     = isUpcoming ? 'none' : '';
  document.getElementById('f-time-row').style.display      = isUpcoming ? '' : 'none';

  document.getElementById('form-overlay').classList.add('open');
}

function closeForm() {
  document.getElementById('form-overlay').classList.remove('open');
}

function resetForm() {
  ['f-title','f-date','f-time','f-venue','f-desc-cs','f-desc-en','f-desc-de','f-desc-es',
   'f-maps','f-fb','f-tickets','f-photos','f-dd-cs','f-dd-en','f-dd-de','f-dd-es']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('f-highlight').checked = false;
  // Reset lang tabs to CS
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === 'cs'));
  document.querySelectorAll('.lang-panel').forEach(p => p.classList.toggle('active', p.dataset.lang === 'cs'));
  document.getElementById('advanced-section').classList.remove('open');
}

document.getElementById('btn-add').addEventListener('click',    () => openForm());
document.getElementById('btn-cancel').addEventListener('click', closeForm);
document.getElementById('form-close').addEventListener('click', closeForm);
document.getElementById('form-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('form-overlay')) closeForm();
});

// ── Form: uložení ─────────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', async () => {
  const title = document.getElementById('f-title').value.trim();
  const dateV = document.getElementById('f-date').value;
  if (!title || !dateV) { alert('Vyplň název a datum.'); return; }

  const date = Timestamp.fromDate(new Date(dateV));

  let data = { type: currentTab, title, date };

  if (currentTab === 'upcoming') {
    data.time       = document.getElementById('f-time').value || '';
    data.venue      = document.getElementById('f-venue').value.trim();
    data.desc_cs    = document.getElementById('f-desc-cs').value.trim();
    data.desc_en    = document.getElementById('f-desc-en').value.trim();
    data.desc_de    = document.getElementById('f-desc-de').value.trim();
    data.desc_es    = document.getElementById('f-desc-es').value.trim();
    data.mapsUrl    = document.getElementById('f-maps').value.trim();
    data.fbUrl      = document.getElementById('f-fb').value.trim();
    data.ticketsUrl = document.getElementById('f-tickets').value.trim();
  } else {
    data.photosUrl  = document.getElementById('f-photos').value.trim();
    data.highlight  = document.getElementById('f-highlight').checked;
    const dd = {
      cs: document.getElementById('f-dd-cs').value.trim(),
      en: document.getElementById('f-dd-en').value.trim(),
      de: document.getElementById('f-dd-de').value.trim(),
      es: document.getElementById('f-dd-es').value.trim(),
    };
    if (dd.cs || dd.en || dd.de || dd.es) data.dateDisplay = dd;
  }

  try {
    showStatus('Ukládám…', 'loading');
    if (editingId) {
      await updateDoc(doc(db, 'concerts', editingId), data);
    } else {
      await addDoc(collection(db, 'concerts'), data);
    }
    closeForm();
    await loadConcerts();
    showStatus('✓ Uloženo.', 'success');
  } catch (e) {
    showStatus('Chyba při ukládání: ' + e.message, 'error');
  }
});

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteConcert(id) {
  const c = concerts.find(x => x.id === id);
  if (!confirm(`Smazat akci "${c?.title}"?`)) return;
  try {
    await deleteDoc(doc(db, 'concerts', id));
    await loadConcerts();
    showStatus('Smazáno.', 'success');
  } catch (e) {
    showStatus('Chyba: ' + e.message, 'error');
  }
}

// ── Auto-překlad (MyMemory API) ───────────────────────────────────────────────
document.getElementById('btn-translate').addEventListener('click', async () => {
  const text = document.getElementById('f-desc-cs').value.trim();
  if (!text) { alert('Nejprve napiš český popis.'); return; }

  const btn = document.getElementById('btn-translate');
  btn.disabled = true;
  btn.textContent = '⏳ Překládám…';

  try {
    const [en, de, es] = await Promise.all([
      translate(text, 'en'),
      translate(text, 'de'),
      translate(text, 'es'),
    ]);
    document.getElementById('f-desc-en').value = en;
    document.getElementById('f-desc-de').value = de;
    document.getElementById('f-desc-es').value = es;
    showStatus('✓ Přeloženo. Zkontroluj a uprav dle potřeby.', 'success');
  } catch (e) {
    showStatus('Překlad selhal: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🌐 Přeložit EN / DE / ES';
  }
});

async function translate(text, toLang) {
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=cs|${toLang}`;
  const res  = await fetch(url);
  const data = await res.json();
  if (data.responseStatus !== 200) throw new Error(data.responseDetails || toLang);
  return data.responseData.translatedText;
}

// ── Lang tabs v popisu ────────────────────────────────────────────────────────
document.querySelectorAll('.lang-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const lang = tab.dataset.lang;
    document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
    document.querySelectorAll('.lang-panel').forEach(p => p.classList.toggle('active', p.dataset.lang === lang));
  });
});

// ── Advanced toggle (datum override) ─────────────────────────────────────────
document.getElementById('toggle-advanced').addEventListener('click', () => {
  const sec = document.getElementById('advanced-section');
  const btn = document.getElementById('toggle-advanced');
  const open = sec.classList.toggle('open');
  btn.textContent = (open ? '▾' : '▸') + ' Pokročilé: vlastní zobrazení data';
});

// ── Generovat web (GitHub Actions) ───────────────────────────────────────────
document.getElementById('btn-generate').addEventListener('click', async () => {
  let pat = localStorage.getItem('10men-github-pat');
  if (!pat) {
    pat = prompt(
      'Zadej GitHub Personal Access Token\n' +
      '(Settings → Developer settings → Fine-grained tokens → scope: Actions: Read & Write):'
    );
    if (!pat) return;
    localStorage.setItem('10men-github-pat', pat.trim());
  }

  try {
    showStatus('⏳ Spouštím generátor…', 'loading');
    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/${GITHUB_WORKFLOW}/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${pat}`,
          'Accept': 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' }),
      }
    );

    if (res.status === 204) {
      showStatus('🚀 Generátor spuštěn! Web se aktualizuje za ~30 sekund.', 'success');
    } else {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) {
        localStorage.removeItem('10men-github-pat');
        showStatus('❌ Neplatný GitHub token — odstraněn, zadej znovu.', 'error');
      } else {
        showStatus(`❌ GitHub API chyba ${res.status}: ${err.message || ''}`, 'error');
      }
    }
  } catch (e) {
    showStatus('❌ ' + e.message, 'error');
  }
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function toDateInput(date) {
  return date.toISOString().slice(0, 10);
}

let statusTimer;
function showStatus(msg, type = 'loading') {
  const bar  = document.getElementById('status-bar');
  const icon = document.getElementById('status-icon');
  const text = document.getElementById('status-text');
  bar.className = 'show ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
  icon.textContent = type === 'error' ? '❌' : type === 'success' ? '✓' : '⏳';
  text.textContent = msg;
  clearTimeout(statusTimer);
  if (type !== 'loading') statusTimer = setTimeout(() => bar.classList.remove('show'), 4000);
}
