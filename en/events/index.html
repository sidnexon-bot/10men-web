<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koncerty – 10men Vokální skupina</title>
  <meta name="description" content="Nadcházející i proběhlé koncerty a akce vokální skupiny 10men.">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/images/favicon-180.png">
  <link rel="alternate" hreflang="cs" href="https://10men.cz/">
<link rel="alternate" hreflang="en" href="https://10men.cz/en/">
<link rel="alternate" hreflang="de" href="https://10men.cz/de/">
<link rel="alternate" hreflang="es" href="https://10men.cz/es/">
  <style>
    .events-body {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    /* ── Nadcházející akce ── */
    .upcoming-section { margin-bottom: 64px; }

    .event-card {
      border-bottom: 1px solid var(--gray-light);
      overflow: hidden;
    }
    .event-card:first-of-type { border-top: 1px solid var(--gray-light); }

    .event-header {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 0 20px;
      align-items: center;
      padding: 24px 0;
      cursor: pointer;
      user-select: none;
    }
    .event-header:hover .event-info h3 { color: var(--red); }

    .event-date {
      text-align: center;
      background: var(--red);
      color: var(--white);
      padding: 10px 8px;
      border-radius: 2px;
      align-self: start;
      margin-top: 2px;
    }
    .event-date .day {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1;
    }
    .event-date .month {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .event-info h3 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
      transition: color var(--transition);
    }
    .event-meta {
      font-size: 13px;
      color: var(--gray-text);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .event-meta span { display: flex; align-items: center; gap: 5px; }
    .event-meta svg { width: 14px; height: 14px; opacity: 0.6; flex-shrink: 0; }

    .event-toggle {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--gray-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition);
    }
    .event-toggle svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none; stroke-width: 2;
      transition: transform var(--transition);
    }
    .event-card.open .event-toggle { background: var(--red); color: var(--white); }
    .event-card.open .event-toggle svg { transform: rotate(180deg); }

    .event-body {
      display: none;
      padding: 0 0 28px 92px;
    }
    .event-card.open .event-body { display: block; }

    .event-desc {
      font-size: 14px;
      color: var(--gray-text);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .event-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .event-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border: 1.5px solid var(--gray-mid);
      border-radius: 2px;
      color: var(--black);
      transition: var(--transition);
    }
    .event-link:hover { border-color: var(--red); color: var(--red); }
    .event-link.primary {
      background: var(--red); border-color: var(--red); color: var(--white);
    }
    .event-link.primary:hover { background: var(--red-dark); border-color: var(--red-dark); }

    /* ── Proběhlé akce ── */
    .past-section { margin-top: 0; }

    .past-year-group { margin-bottom: 8px; }

    .past-year-label {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 2px solid var(--gray-light);
      text-align: left;
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--red);
      padding: 12px 0 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: color var(--transition);
    }
    .past-year-label:hover { color: var(--black); }
    .past-year-label::after {
      content: '+';
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--gray-mid);
      transition: transform var(--transition);
      line-height: 1;
    }
    .past-year-group.open .past-year-label::after {
      transform: rotate(45deg);
    }

    .past-year-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .past-year-group.open .past-year-content {
      max-height: 9999px;
    }

    .past-event {
      display: flex;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--gray-light);
      align-items: baseline;
    }
    .past-event-date {
      font-size: 13px;
      font-weight: 600;
      color: var(--black);
      min-width: 160px;
      flex-shrink: 0;
    }
    .past-event-name { font-size: 14px; color: var(--gray-text); line-height: 1.5; }
    .past-event-name strong { color: var(--black); }

    .fb-links { margin-top: 40px; display: flex; gap: 16px; flex-wrap: wrap; }

    @media (max-width: 560px) {
      .event-header { grid-template-columns: 60px 1fr auto; gap: 0 12px; }
      .event-body { padding-left: 72px; }
      .past-event { flex-direction: column; gap: 4px; }
      .past-event-date { min-width: unset; }
    }
  </style>
  <style>
  #cookie-banner {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 9999;
    background: #1a1a1a;
    color: #ccc;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.3);
    font-family: 'Work Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  #cookie-banner.hidden { display: none; }
  #cookie-banner p { margin: 0; flex: 1 1 300px; }
  #cookie-banner a { color: #EE220C; text-decoration: underline; }
  .cookie-buttons { display: flex; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
  .cookie-btn {
    padding: 9px 20px;
    font-family: 'Work Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 2px solid transparent;
    border-radius: 2px;
    cursor: pointer;
    transition: 0.2s ease;
  }
  .cookie-btn-accept {
    background: #EE220C;
    color: #fff;
    border-color: #EE220C;
  }
  .cookie-btn-accept:hover { background: #9a1e23; border-color: #9a1e23; }
  .cookie-btn-decline {
    background: transparent;
    color: #aaa;
    border-color: #444;
  }
  .cookie-btn-decline:hover { border-color: #aaa; color: #fff; }

  @media (max-width: 560px) {
    #cookie-banner { padding: 16px 20px; }
    .cookie-buttons { width: 100%; }
    .cookie-btn { flex: 1; text-align: center; }
  }
</style>
  <script>
  (function() {
    var consent = localStorage.getItem('10men-cookie-consent');

    function loadGA() {
      var s = document.createElement('script');
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-YX26X9J3NF';
      s.async = true;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-YX26X9J3NF', { anonymize_ip: true });
    }

    if (consent === 'accepted') {
      loadGA();
    }

    document.addEventListener('DOMContentLoaded', function() {
      var banner = document.getElementById('cookie-banner');
      if (!banner) return;

      if (consent === 'accepted' || consent === 'declined') {
        banner.classList.add('hidden');
        return;
      }

      document.getElementById('cookie-accept').addEventListener('click', function() {
        localStorage.setItem('10men-cookie-consent', 'accepted');
        banner.classList.add('hidden');
        loadGA();
      });

      document.getElementById('cookie-decline').addEventListener('click', function() {
        localStorage.setItem('10men-cookie-consent', 'declined');
        banner.classList.add('hidden');
      });
    });
  })();
</script>
</head>
<body>
<div id="cookie-banner">
  <p>
    This website uses Google Analytics cookies to measure traffic.
Your data is anonymized and not used for advertising purposes.
    <a href="/cookies.html">More information (CZ)</a>
  </p>
  <div class="cookie-buttons">
    <button class="cookie-btn cookie-btn-decline" id="cookie-decline">Decline</button>
    <button class="cookie-btn cookie-btn-accept" id="cookie-accept">Accept</button>
  </div>
</div>

<div id="nav-placeholder"></div>

<div class="page-header">
  <p class="subtitle" data-i18n="events_subtitle">Přijďte si nás poslechnout</p>
  <h1 data-i18n="events_h1">Koncerty & akce</h1>
</div>

<div class="events-body">

  <section class="upcoming-section">
    <p class="section-label" data-i18n="upcoming_label">Nadcházející</p>
    <h2 class="section-title" data-i18n="upcoming_title">Plánované akce</h2>
    <div class="accent-line"></div>

  <div class="accent-line"></div>

    <!-- GEN:UPCOMING:START -->

  </section>

  <!-- ══════════════════════════════════════════════
       PROBĚHLÉ AKCE
       Každý rok je zabalen do .past-year-group.
       Kliknutím na rok se rozbalí/zabalí akce.
       ══════════════════════════════════════════════ -->
 <section class="past-section">
  <p class="section-label" data-i18n="past_label">Archiv</p>
  <h2 class="section-title" data-i18n="past_title">Proběhlé akce</h2>
  <div class="accent-line"></div>

   <div class="accent-line"></div>

    <!-- GEN:PAST:START -->

</section>

</div>

<div id="footer-placeholder"></div>

<script src="/shared.js"></script>
<script>
  // ── i18n ──
  const i18n = {
    cs: {
      events_subtitle: 'Přijďte si nás poslechnout', events_h1: 'Koncerty & akce',
      upcoming_label: 'Nadcházející', upcoming_title: 'Plánované akce',
      past_label: 'Archiv', past_title: 'Proběhlé akce',
      fb_10men: 'FB 10men', fb_lamen: 'FB LAMEN',
    },
    en: {
      events_subtitle: 'Come hear us', events_h1: 'Concerts & Events',
      upcoming_label: 'Upcoming', upcoming_title: 'Planned Events',
      past_label: 'Archive', past_title: 'Past Events',
      fb_10men: 'FB 10men', fb_lamen: 'FB LAMEN',
    },
    de: {
  events_subtitle: 'Kommen Sie und hören Sie uns live',
  events_h1: 'Konzerte & Veranstaltungen',

  upcoming_label: 'Bevorstehend',
  upcoming_title: 'Geplante Veranstaltungen',

  past_label: 'Archiv',
  past_title: 'Vergangene Veranstaltungen',

  fb_10men: '10men auf Facebook',
  fb_lamen: 'LAMEN auf Facebook',
},
    es: {
  events_subtitle: 'Ven a escucharnos en directo',
  events_h1: 'Conciertos y eventos',

  upcoming_label: 'Próximos',
  upcoming_title: 'Próximos eventos',

  past_label: 'Archivo',
  past_title: 'Eventos pasados',

  fb_10men: '10men en Facebook',
  fb_lamen: 'LAMEN en Facebook',
}
  };
  window.applyI18n = function(lang) {
    Object.keys(i18n[lang]).forEach(key => {
      document.querySelectorAll(`[data-i18n="${key}"]`).forEach(el => {
        el.textContent = i18n[lang][key];
      });
    });
  };
  document.addEventListener('DOMContentLoaded', () => {
    window.applyI18n(window.getCurrentLang ? window.getCurrentLang() : 'cs');
  });

  // ── Accordion: nadcházející akce ──
  document.querySelectorAll('.event-card').forEach(card => {
    const header = card.querySelector('.event-header');
    const linksContainer = card.querySelector('.event-links');
    const maps = card.dataset.maps;
    const fb = card.dataset.fb;
    const tickets = card.dataset.tickets;
    if (maps) linksContainer.insertAdjacentHTML('beforeend', `<a href="${maps}" target="_blank" rel="noopener" class="event-link">📍 Ukázat na mapě</a>`);
    if (fb) linksContainer.insertAdjacentHTML('beforeend', `<a href="${fb}" target="_blank" rel="noopener" class="event-link">FB událost</a>`);
    if (tickets) linksContainer.insertAdjacentHTML('beforeend', `<a href="${tickets}" target="_blank" rel="noopener" class="event-link primary">Koupit vstupenky</a>`);
    header.addEventListener('click', () => {
      const isOpen = card.classList.contains('open');
      document.querySelectorAll('.event-card.open').forEach(c => c.classList.remove('open'));
      if (!isOpen) card.classList.add('open');
    });
  });

  // ── Accordion: proběhlé akce (roky) ──
  document.querySelectorAll('.past-year-group').forEach(group => {
    group.querySelector('.past-year-label').addEventListener('click', () => {
      group.classList.toggle('open');
    });
  });

  // ── Google Photos proklik ──
document.querySelectorAll('.past-event[data-photos]').forEach(event => {
  const url = event.dataset.photos;
  const div = document.createElement('div');
  div.className = 'past-event-photos';
  div.innerHTML = `<a href="${url}" target="_blank" rel="noopener">Foto</a>`;
  event.appendChild(div);
});
  
</script>
</body>
</html>
