<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koncerty – 10men Vokální skupina</title>
  <meta name="description" content="Nadcházející i proběhlé koncerty a akce vokální skupiny 10men.">
  <link rel="stylesheet" href="style.css">
  <style>
    .events-body {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    /* Upcoming */
    .upcoming-section { margin-bottom: 64px; }
    .upcoming-section h2 { margin-bottom: 32px; }

    .event-card {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 0 24px;
      align-items: start;
      padding: 28px 0;
      border-bottom: 1px solid var(--gray-light);
    }
    .event-card:first-of-type { border-top: 1px solid var(--gray-light); }

    .event-date {
      text-align: center;
      background: var(--red);
      color: var(--white);
      padding: 10px 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .event-date .day {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1;
    }
    .event-date .month {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .event-info h3 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .event-meta {
      font-size: 13px;
      color: var(--gray-text);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .event-meta span { display: flex; align-items: center; gap: 5px; }
    .event-meta svg { width: 14px; height: 14px; opacity: 0.6; }
    .event-desc {
      font-size: 14px;
      color: var(--gray-text);
      line-height: 1.6;
    }

    /* Empty state */
    .no-events {

  <div class="past-event">

<div id="footer-placeholder"></div>

<script src="shared.js"></script>
<script>
  const i18n = {
    cs: {
      events_subtitle: 'Přijďte nás slyšet', events_h1: 'Koncerty & akce',
      upcoming_label: 'Nadcházející', upcoming_title: 'Plánované akce',
      no_events_h: 'Zatím žádné naplánované koncerty',
      no_events_p: 'Jakmile naplánujeme nějakou akci, objeví se zde. Sledujte nás na sociálních sítích!',
      past_label: 'Archiv', past_title: 'Proběhlé akce',
      fb_10men: 'FB 10men', fb_lamen: 'FB LAMEN',
    },
    en: {
      events_subtitle: 'Come hear us', events_h1: 'Concerts & Events',
      upcoming_label: 'Upcoming', upcoming_title: 'Planned Events',
      no_events_h: 'No concerts planned yet',
      no_events_p: 'Once we schedule an event, it will appear here. Follow us on social media!',
      past_label: 'Archive', past_title: 'Past Events',
      fb_10men: 'FB 10men', fb_lamen: 'FB LAMEN',
    }
  };
  window.applyI18n = function(lang) {
    Object.keys(i18n[lang]).forEach(key => {
      document.querySelectorAll(`[data-i18n="${key}"]`).forEach(el => {
        el.textContent = i18n[lang][key];
      });
    });
  };
  document.addEventListener('DOMContentLoaded', () => {
    window.applyI18n(window.getCurrentLang ? window.getCurrentLang() : 'cs');
  });
</script>
</body>
